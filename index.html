<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover">
<title>橋梁点検 写真野帳 v11</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="写真野帳">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="brand">写真野帳 v11</div>
  <div class="topBtns">
    <button id="backBtn">戻る</button>
    <button id="navHome">トップ</button>
    <button id="navPdf">PDF</button>
    <button id="navEdit">編集</button>
    <button id="navSync">写真保存</button>
  </div>
</header>

<main>
<section id="homePage" class="page active">
  <div class="card">
    <h1>橋梁一覧</h1>
    <p class="note">写真・PDFは端末内データベースに保存します。写真は未同期/同期済みで管理します。</p>
    <label>橋梁名<input id="newBridge" placeholder="例：野間橋" value="試作橋"></label>
    <button class="primary" id="createBridge">新規作成 / 開く</button>
    <div id="bridgeList"></div>
  </div>
</section>

<section id="pdfPage" class="page">
  <div class="card">
    <h2>PDF登録</h2>
    <div id="currentBridgeBox" class="statusBox">橋梁未選択</div>
    <label class="fileBtn">PDFを追加<input id="pdfInput" type="file" accept="application/pdf" multiple></label>
    <div id="pdfList"></div>
  </div>
</section>

<section id="editorPage" class="page editorPage">
  <div class="editorTop">
    <select id="pdfSelect"></select>
    <button class="tool active" id="move">✋ 移動</button>
    <button class="tool cameraTool" id="photoIcon">📷 写真</button>
    <button class="tool" id="pen">✍️ ペン</button>
    <button class="tool" id="marker">🟨 マーカー</button>
    <button class="tool" id="text">T 文字</button>
    <button class="tool" id="eraser">消しゴム</button>
    <button id="undo">戻す</button>
    <button id="thumbBtn">一覧</button>
    <button id="reset">表示</button>
    <button class="danger" id="clearPage">ページ記入削除</button>
  </div>
  <div class="editorSub">
    <button id="prev">◀</button><span id="pageInfo">PDF未読込</span><button id="next">▶</button>
    <button id="checkPage">このページをチェック</button>
    <label>ペン太さ<input id="penSize" type="range" min="1" max="14" value="3"></label>
    <label>消しゴム<input id="eraserSize" type="range" min="8" max="60" value="28"></label>
    <label>色<input id="penColor" type="color" value="#dc2626"></label>
  </div>
  <div id="view">
    <div id="stage">
      <canvas id="pdfCanvas"></canvas>
      <canvas id="inkCanvas"></canvas>
      <div id="icons"></div>
      <div id="empty">PDFを登録して開いてください</div>
    </div>
  </div>
</section>

<section id="syncPage" class="page">
  <div class="card">
    <h2>写真保存</h2>
    <div id="syncSummary" class="statusBox"></div>
    <label>OneDrive保存フォルダー名<input id="folderName" placeholder="未入力なら橋梁名"></label>
    <div class="actionGrid">
      <button class="primary" id="zipAndOpenOneDriveBtn">写真ZIPを出力してOneDriveを開く</button>
      <button id="zipBtn">写真ZIP出力</button>
      <button id="openOneDriveBtn">OneDriveを開く</button>
      <button id="csvBtn">CSV出力</button>
    </div>
    <p id="syncMessage" class="note">現場では写真ZIPを出力し、OneDriveアプリまたはWeb版OneDriveに保存してください。</p>
    <div id="photoSummary" class="photoSummary"></div>
  </div>
</section>
</main>

<input id="autoPhoto" type="file" accept="image/*" capture="environment" multiple hidden>
<input id="addPhoto" type="file" accept="image/*" capture="environment" multiple hidden>

<div id="photoModal" class="modal hidden">
  <div class="modalBox">
    <div class="modalHeader"><h2 id="modalTitle">写真確認</h2><button id="closePhoto">閉じる</button></div>
    <div id="modalPhotos" class="modalPhotos"></div>
    <div class="modalActions">
      <button id="modalAddPhoto">連続で写真追加</button>
      <button id="modalMoveIcon">位置変更</button>
      <button id="modalDeleteIcon" class="danger">削除</button>
    </div>
  </div>
</div>

<div id="thumbModal" class="modal hidden">
  <div class="modalBox wide">
    <div class="modalHeader"><h2>PDFページ一覧</h2><button id="closeThumb">閉じる</button></div>
    <div id="thumbGrid" class="thumbGrid"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="app.js"></script>
</body>
</html>
